apiVersion: networking.k8s.io/v1   # API version for Ingress resource
kind: Ingress                      # We are creating an Ingress object

metadata:
  name: my-ingress                 # Name of the Ingress

spec:
  rules:                           # Rules define how traffic is routed

    - host: myapp.com              # Domain name المستخدم will access
      http:                        # HTTP routing rules

        paths:
          - path: /app1            # URL path (example: myapp.com/app1)
            pathType: Prefix       # Matches all requests starting with /app1

            backend:               # Where to send the traffic
              service:
                name: app1-service # Service name (must already exist)
                port:
                  number: 80       # Service port

          - path: /app2            # Another path (myapp.com/app2)
            pathType: Prefix       # Same prefix matching rule

            backend:
              service:
                name: app2-service # Second service
                port:
                  number: 80       # Service port


🔍 Explanation (Step by Step)
🔹 apiVersion: networking.k8s.io/v1

This specifies the API version used to create the Ingress resource.

🔹 kind: Ingress

This tells Kubernetes that you are creating an Ingress object, which is used to route external traffic.

🔹 metadata
metadata:
  name: my-ingress

This is the name of the Ingress
Used to identify it inside the cluster
🔹 spec

This section contains the actual routing rules.

🔹 rules
rules:
  - host: myapp.com

Defines the domain name
When a user types myapp.com, this rule will apply
🔹 http
http:

Specifies that routing is based on HTTP/HTTPS traffic
🔹 paths
paths:
  - path: /app1

Defines the URL path
Example: myapp.com/app1
🔹 pathType: Prefix
Means:
Any request starting with /app1 will match
Example:
/app1
/app1/test
/app1/data
🔹 backend
backend:
  service:
    name: app1-service
    port:
      number: 80


This is the destination where traffic is sent.

name: app1-service → Kubernetes Service name
port: 80 → Service port

👉 That service will forward traffic to the actual pods.

🔁 How It Works (Flow)

User opens:

http://myapp.com/app1

Ingress receives request
It checks:
Host → myapp.com
Path → /app1

It forwards request to:

app1-service:80

Service sends request to pod
⚠️ Important Notes
❗ Ingress needs a Controller

Ingress alone will NOT work.
You must install an Ingress Controller.

Example (Minikube):

minikube addons enable ingress

🧠 Simple Summary
Ingress is a router
It routes traffic based on:
Domain (host)
URL path
It sends traffic to Services
Services send traffic to Pods

